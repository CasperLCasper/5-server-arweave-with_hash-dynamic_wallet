name: Update package-lock.json

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 0 * * 1' 

permissions:
  contents: write

jobs:
  update-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          # 1. UZLABOJUMS: Kešatmiņa (Cache) ātrākai izpildei. 
          # Nākamajās reizēs GitHub nevilks visus npm moduļus no jauna, un skripts izpildīsies daudz ātrāk.
          cache: 'npm'

      # 2. UZLABOJUMS: 'npm update' (vai 'npm install --package-lock-only')
      # Ja mērķis ir atjaunināt pakotnes uz jaunākajām pieļaujamajām versijām, 
      # labāk izmantot 'npm update'. Ja gribi tikai pārģenerēt lock failu, nemainot versijas,
      # atstāj savu 'npm install'.
      - run: npm update

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 3. UZLABOJUMS: Drošāka failu pārbaude
          # Tavā versijā 'git commit' neizgāzās (pateicoties || echo), bet ar šo pārbaudi
          # mēs vispār nemēģinām taisīt commit/push, ja nekas nav mainījies.
          if [ -n "$(git status --porcelain package-lock.json)" ]; then
            git add package-lock.json
            git commit -m "chore: update package-lock.json [skip ci]"
            git push
          else
            echo "package-lock.json jau ir aktuāls, nav ko saglabāt."
          fi
