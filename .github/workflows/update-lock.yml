name: Update package-lock.json

on:
  workflow_dispatch: # Saglabā iespēju palaist manuāli ar pogu no GitHub Actions paneļa
  schedule:
    - cron: '0 0 * * 1' # Automātiski izpildīsies katru pirmdienu plkst. 00:00 UTC

permissions:
  contents: write

jobs:
  update-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "Update package-lock.json with safe ws" || echo "No changes to commit"
          git push
